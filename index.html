<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UmU Studios — Stories</title>

  <!-- Icons & Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar-custom">
    <div class="nav-logo" id="nav-logo-text" onclick="showPage('home')"></div>
    <div class="nav-links">
      <button class="nav-btn active" id="nav-home" onclick="showPage('home')">
        <i class="bi bi-house-door"></i> Home
      </button>
      <button class="nav-btn" id="nav-collections" onclick="showPage('collections')">
        <i class="bi bi-collection"></i> Collections
      </button>
      <button class="nav-btn nav-write-btn" id="nav-write" onclick="showPage('write')">
        <i class="bi bi-pencil-square"></i> Write
      </button>
    </div>
  </nav>


  <!-- ═══════════════════════════════════════ -->
  <!-- PAGE: HOME                              -->
  <!-- ═══════════════════════════════════════ -->
  <div class="page active" id="page-home">

    <!-- Hero — rendered by render.js from siteConfig in data.js -->
    <section class="hero" id="hero-section"></section>

    <hr class="divider"/>

    <div class="section-header">
      <div class="section-title"><span>◆</span> Collections</div>
      <button class="see-all-btn" onclick="showPage('collections')">View all →</button>
    </div>
    <div class="collections-scroll-wrap">
      <div class="collections-scroll" id="home-collections-scroll"></div>
    </div>

    <hr class="divider"/>

    <div class="section-header">
      <div class="section-title"><span>◆</span> Latest Uploads</div>
    </div>
    <div class="chapters-grid" id="home-chapters-grid"></div>

  </div><!-- /page-home -->


  <!-- ═══════════════════════════════════════ -->
  <!-- PAGE: COLLECTIONS                       -->
  <!-- ═══════════════════════════════════════ -->
  <div class="page" id="page-collections">
    <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
      <div>
        <h2>Collections</h2>
        <p>Browse all story collections — click one to explore chapters.</p>
      </div>
      <button class="new-col-btn" onclick="openNewCollectionModal()">
        <i class="bi bi-plus-lg"></i> New Collection
      </button>
    </div>
    <div class="collections-grid" id="collections-full-grid"></div>
  </div>


  <!-- ═══════════════════════════════════════ -->
  <!-- PAGE: COLLECTION DETAIL                 -->
  <!-- ═══════════════════════════════════════ -->
  <div class="page" id="page-detail">
    <div style="max-width:860px;margin:0 auto;padding:2rem 2rem 4rem;">
      <button class="back-btn" onclick="showPage('collections')">
        <i class="bi bi-arrow-left"></i> Back
      </button>
      <div class="detail-header" id="detail-header"></div>
      <div class="section-title" style="font-family:'Playfair Display',serif;font-size:1rem;padding:0;margin-bottom:1rem;">
        <span style="color:var(--accent)">◆</span> Chapters
      </div>
      <div class="chapter-list" id="detail-chapter-list"></div>
    </div>
  </div>


  <!-- ═══════════════════════════════════════ -->
  <!-- PAGE: READER                            -->
  <!-- ═══════════════════════════════════════ -->
  <div class="page" id="page-reader">
    <div class="reader-wrap" id="reader-content"></div>
  </div>


  <!-- ═══════════════════════════════════════ -->
  <!-- PAGE: WRITE                             -->
  <!-- ═══════════════════════════════════════ -->
  <div class="page" id="page-write">
    <div class="write-wrap">
      <div class="write-header">
        <div>
          <h2 class="write-title">New Chapter</h2>
          <p class="write-sub">Write, assign to a collection, and publish.</p>
        </div>
        <div class="write-actions">
          <button class="btn-cancel" onclick="clearWriter()">
            <i class="bi bi-arrow-counterclockwise"></i> Clear
          </button>
          <button class="btn-create" onclick="publishChapter()">
            <i class="bi bi-send"></i> Publish
          </button>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Chapter Title <span class="field-required">*</span></label>
        <input type="text" id="write-title" class="field-input write-title-input"
          placeholder="Give your chapter a title..." maxlength="120"/>
      </div>

      <div class="field-group">
        <label class="field-label">Add to Collection <span class="field-required">*</span></label>
        <div class="collection-selector" id="collection-selector"></div>
      </div>

      <div class="field-group">
        <label class="field-label" style="display:flex;justify-content:space-between;">
          <span>Story Body <span class="field-required">*</span></span>
          <span id="write-word-count" class="field-counter">0 words</span>
        </label>
        <textarea id="write-body" class="field-textarea write-body-textarea"
          placeholder="Begin your chapter here..."
          oninput="updateWordCount()"></textarea>
      </div>

      <div id="publish-toast" class="publish-toast" style="display:none;"></div>
    </div>
  </div>


  <!-- ═══ MODAL: NEW COLLECTION ═══ -->
  <div class="modal-backdrop" id="modal-backdrop" onclick="closeNewCollectionModal()"></div>
  <div class="modal-box" id="new-col-modal">
    <div class="modal-header">
      <div class="modal-title">Create New Collection</div>
      <button class="modal-close-btn" onclick="closeNewCollectionModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Collection Name <span class="field-required">*</span></label>
        <input type="text" id="new-col-name" class="field-input" placeholder="e.g. My Fantasy Chronicles" maxlength="80"/>
      </div>
      <div class="field-group">
        <label class="field-label">Genre / Tag</label>
        <input type="text" id="new-col-genre" class="field-input" placeholder="e.g. Fantasy / Action" maxlength="40"/>
      </div>
      <div class="field-group">
        <label class="field-label" style="display:flex;justify-content:space-between;">
          <span>Description <span class="field-required">*</span></span>
          <span id="col-desc-counter" class="field-counter">0 / 200 words</span>
        </label>
        <textarea id="new-col-desc" class="field-textarea" rows="5"
          placeholder="Describe your collection in up to 200 words..."
          oninput="checkDescWords()"></textarea>
        <div class="field-hint" id="col-desc-hint"></div>
      </div>
      <div class="field-group">
        <label class="field-label">Accent Colour</label>
        <div class="color-picker-row">
          <div class="color-swatch active-swatch" data-color="#c9a84c" style="background:#c9a84c" onclick="pickAccent(this,'#c9a84c')"></div>
          <div class="color-swatch" data-color="#8b3a3a" style="background:#8b3a3a" onclick="pickAccent(this,'#8b3a3a')"></div>
          <div class="color-swatch" data-color="#4c7a8b" style="background:#4c7a8b" onclick="pickAccent(this,'#4c7a8b')"></div>
          <div class="color-swatch" data-color="#6b4c8b" style="background:#6b4c8b" onclick="pickAccent(this,'#6b4c8b')"></div>
          <div class="color-swatch" data-color="#4c8b5e" style="background:#4c8b5e" onclick="pickAccent(this,'#4c8b5e')"></div>
          <div class="color-swatch" data-color="#8b5e3a" style="background:#8b5e3a" onclick="pickAccent(this,'#8b5e3a')"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeNewCollectionModal()">Cancel</button>
      <button class="btn-create" onclick="createNewCollection()"><i class="bi bi-plus-lg"></i> Create Collection</button>
    </div>
  </div>


  <!-- ═══ MODAL: EDIT PROFILE ═══ -->
  <div class="modal-backdrop" id="profile-backdrop" onclick="closeProfileModal()"></div>
  <div class="modal-box" id="profile-modal">
    <div class="modal-header">
      <div class="modal-title">Edit Profile</div>
      <button class="modal-close-btn" onclick="closeProfileModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Display Name <span class="field-required">*</span></label>
        <input type="text" id="prof-name" class="field-input" maxlength="60" placeholder="e.g. Mayank / UmU Studios"/>
      </div>
      <div class="field-group">
        <label class="field-label">Handle / Tag <span class="field-required">*</span></label>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="color:var(--muted);font-size:1rem;">@</span>
          <input type="text" id="prof-handle" class="field-input" maxlength="40" placeholder="Mr_UmU" style="flex:1;"/>
          <input type="text" id="prof-tag" class="field-input" maxlength="40" placeholder="Editor & Author" style="flex:1.5;"/>
        </div>
        <div class="field-hint" style="color:var(--muted);font-size:0.75rem;">handle &nbsp;·&nbsp; role / tagline</div>
      </div>
      <div class="field-group">
        <label class="field-label">Bio</label>
        <textarea id="prof-bio" class="field-textarea" rows="4" maxlength="500"
          placeholder="Write something about yourself..."></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">Avatar Initial</label>
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
          <div id="avatar-preview" style="width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:#0b0b0e;border:2px solid var(--border);flex-shrink:0;"></div>
          <input type="text" id="prof-initial" class="field-input" maxlength="2"
            placeholder="M" oninput="updateAvatarPreview()" style="text-align:center;font-size:1.1rem;width:60px;"/>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Avatar Colour</label>
        <div class="color-picker-row" id="avatar-color-row">
          <div class="color-swatch active-swatch" data-color="linear-gradient(135deg,#c9a84c,#6b4f1e)" style="background:linear-gradient(135deg,#c9a84c,#6b4f1e)" onclick="pickAvatarColor(this,'linear-gradient(135deg,#c9a84c,#6b4f1e)')"></div>
          <div class="color-swatch" data-color="linear-gradient(135deg,#8b3a3a,#4a1a1a)" style="background:linear-gradient(135deg,#8b3a3a,#4a1a1a)" onclick="pickAvatarColor(this,'linear-gradient(135deg,#8b3a3a,#4a1a1a)')"></div>
          <div class="color-swatch" data-color="linear-gradient(135deg,#4c7a8b,#1e3d4a)" style="background:linear-gradient(135deg,#4c7a8b,#1e3d4a)" onclick="pickAvatarColor(this,'linear-gradient(135deg,#4c7a8b,#1e3d4a)')"></div>
          <div class="color-swatch" data-color="linear-gradient(135deg,#6b4c8b,#2e1a4a)" style="background:linear-gradient(135deg,#6b4c8b,#2e1a4a)" onclick="pickAvatarColor(this,'linear-gradient(135deg,#6b4c8b,#2e1a4a)')"></div>
          <div class="color-swatch" data-color="linear-gradient(135deg,#4c8b5e,#1a3d28)" style="background:linear-gradient(135deg,#4c8b5e,#1a3d28)" onclick="pickAvatarColor(this,'linear-gradient(135deg,#4c8b5e,#1a3d28)')"></div>
          <div class="color-swatch" data-color="linear-gradient(135deg,#3a3a8b,#1a1a4a)" style="background:linear-gradient(135deg,#3a3a8b,#1a1a4a)" onclick="pickAvatarColor(this,'linear-gradient(135deg,#3a3a8b,#1a1a4a)')"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeProfileModal()">Cancel</button>
      <button class="btn-create" onclick="saveProfile()"><i class="bi bi-check-lg"></i> Save Profile</button>
    </div>
  </div>


  <!-- ═══ MODAL: EDIT COLLECTION ═══ -->
  <div class="modal-backdrop" id="edit-col-backdrop" onclick="closeEditColModal()"></div>
  <div class="modal-box" id="edit-col-modal">
    <div class="modal-header">
      <div class="modal-title">Edit Collection</div>
      <button class="modal-close-btn" onclick="closeEditColModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Collection Name <span class="field-required">*</span></label>
        <input type="text" id="edit-col-name" class="field-input" maxlength="80"/>
      </div>
      <div class="field-group">
        <label class="field-label">Genre / Tag</label>
        <input type="text" id="edit-col-genre" class="field-input" maxlength="40"/>
      </div>
      <div class="field-group">
        <label class="field-label" style="display:flex;justify-content:space-between;">
          <span>Description <span class="field-required">*</span></span>
          <span id="edit-col-desc-counter" class="field-counter">0 / 200 words</span>
        </label>
        <textarea id="edit-col-desc" class="field-textarea" rows="5"
          oninput="checkEditColDescWords()"></textarea>
        <div class="field-hint" id="edit-col-desc-hint"></div>
      </div>
      <div class="field-group">
        <label class="field-label">Accent Colour</label>
        <div class="color-picker-row" id="edit-col-color-row">
          <div class="color-swatch" data-color="#c9a84c" style="background:#c9a84c" onclick="pickEditColAccent(this,'#c9a84c')"></div>
          <div class="color-swatch" data-color="#8b3a3a" style="background:#8b3a3a" onclick="pickEditColAccent(this,'#8b3a3a')"></div>
          <div class="color-swatch" data-color="#4c7a8b" style="background:#4c7a8b" onclick="pickEditColAccent(this,'#4c7a8b')"></div>
          <div class="color-swatch" data-color="#6b4c8b" style="background:#6b4c8b" onclick="pickEditColAccent(this,'#6b4c8b')"></div>
          <div class="color-swatch" data-color="#4c8b5e" style="background:#4c8b5e" onclick="pickEditColAccent(this,'#4c8b5e')"></div>
          <div class="color-swatch" data-color="#8b5e3a" style="background:#8b5e3a" onclick="pickEditColAccent(this,'#8b5e3a')"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditColModal()">Cancel</button>
      <button class="btn-create" onclick="saveCollectionEdit()"><i class="bi bi-check-lg"></i> Save Changes</button>
    </div>
  </div>


  <!-- ═══ SCRIPTS ═══ -->
  <!-- Load order matters: data first, then render, then modals, then app -->
  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
